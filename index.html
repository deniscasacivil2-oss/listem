<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Olímpia +Empreendedora</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- PropTypes (Dependência do Recharts) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  
  <!-- Babel para transpilar JSX no browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.15); border-radius: 10px; }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, Fragment } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend, LabelList } = window.Recharts;
    
    const IconBase = ({ size = 24, className = "", children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const LayoutDashboard = (p) => <IconBase {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>;
    const AlertCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
    const RefreshCw = (p) => <IconBase {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
    const MenuIcon = (p) => <IconBase {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
    const ChevronLeft = (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"/></IconBase>;
    const ChartLine = (p) => <IconBase {...p}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></IconBase>;
    const XIcon = (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
    const FolderIcon = (p) => <IconBase {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></IconBase>;
    const UsersIcon = (p) => <IconBase {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
    const PieChartIcon = (p) => <IconBase {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></IconBase>;
    const BookOpen = (p) => <IconBase {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
    const UserIcon = (p) => <IconBase {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
    const MousePointerClick = (p) => <IconBase {...p}><path d="m9 9 5 12 1.77-5.23L21 14Z"/><path d="m16.07 16.07 4.24 4.24"/><path d="M7.19 4.19 8.6 5.6"/><path d="M4.19 7.19 5.6 8.6"/><path d="M2 12h2"/><path d="M12 2v2"/></IconBase>;
    const MapPin = (p) => <IconBase {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
    
    const CHART_COLORS = ['#003366', '#ffb800', '#14b8a6', '#f97316', '#3b82f6', '#8b5cf6', '#ef4444', '#10b981'];

    const censorName = (name) => {
      if (!name || typeof name !== "string") return name;
      const parts = name.trim().split(/\s+/);
      if (parts.length <= 2) return name;
      return `${parts[0]} *** ${parts[parts.length - 1]}`;
    };

    const censorPhone = (phone) => {
      if (!phone || typeof phone !== "string") return phone;
      return phone.replace(/(\d{4,5})([-.\s]?)(\d{4})(?!\d)/, '****$2$3');
    };

    const formatDataValue = (key, value) => {
      if (value === null || value === undefined || value === "") return "-";
      
      const strValue = String(value);
      const keyLower = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      if (keyLower.includes("frequencia") || keyLower.includes("percentual")) {
        const num = Number(value);
        if (!isNaN(num)) {
          return `${(num <= 1 && num > 0 ? num * 100 : num).toFixed(1)}%`;
        }
      }

      if ((keyLower.includes("nome") && !keyLower.includes("empresa") && !keyLower.includes("razao") && !keyLower.includes("razão")) || keyLower.includes("aluno")) {
        return censorName(strValue);
      }

      if (keyLower.includes("telefone") || keyLower.includes("celular") || keyLower.includes("contato")) {
        return censorPhone(strValue);
      }

      return value;
    };

    function Header({ toggleMobileMenu, activeCategoryLabel }) {
      return (
        <header className="bg-white border-b h-16 flex items-center justify-between px-6 lg:px-8 sticky top-0 z-30 shadow-sm flex-shrink-0">
          <div className="flex items-center space-x-4">
            <button onClick={toggleMobileMenu} className="md:hidden text-[#003366] hover:bg-gray-100 p-2 rounded-md">
              <MenuIcon size={24} />
            </button>
            <h1 className="text-lg lg:text-xl font-bold text-[#003366] uppercase tracking-tight flex items-center">
              <span className="text-gray-600">{activeCategoryLabel}</span>
            </h1>
          </div>
          <div className="flex items-center space-x-3">
            <span className="hidden sm:inline-block bg-blue-100 text-[#003366] px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">
              Ano 2026
            </span>
          </div>
        </header>
      );
    }

    function Sidebar({ isCollapsed, setIsCollapsed, isMobileOpen, setIsMobileOpen, categories, activeCategory, setActiveCategory }) {
      const handleCategoryClick = (id) => {
        setActiveCategory(id);
        if (isMobileOpen) setIsMobileOpen(false);
      };

      return (
        <Fragment>
          {isMobileOpen && (
            <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileOpen(false)} />
          )}

          <aside className={`bg-[#003366] text-white flex-shrink-0 flex flex-col fixed md:sticky top-0 h-screen z-50 transition-all duration-300 ease-in-out ${isCollapsed ? "w-20" : "w-64"} ${isMobileOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`}>
            <div className="flex items-center justify-between p-4 border-b border-blue-900 min-h-[64px]">
              {!isCollapsed && (
                <div className="flex items-center gap-3 overflow-hidden">
                  <div className="w-10 h-10 bg-white rounded-md flex items-center justify-center flex-shrink-0 overflow-hidden p-0.5">
                    <img src="https://pt.wikipedia.org/wiki/Special:FilePath/Bras%C3%A3o_de_Ol%C3%ADmpia,_SP.jpg" alt="Prefeitura" className="w-full h-full object-contain" />
                  </div>
                  <div className="flex flex-col">
                    <span className="font-bold text-sm leading-tight tracking-wide">Olímpia +Empreendedora</span>
                    <span className="text-[10px] text-blue-300 uppercase tracking-widest">Sebrae</span>
                  </div>
                </div>
              )}
              <button onClick={() => setIsCollapsed(!isCollapsed)} className="hidden md:block p-2 rounded hover:bg-blue-800 text-blue-200 flex-shrink-0 ml-auto">
                <ChevronLeft size={20} className={`transform transition-transform ${isCollapsed ? "rotate-180" : ""}`} />
              </button>
              <button onClick={() => setIsMobileOpen(false)} className="md:hidden p-2 rounded hover:bg-blue-800 text-blue-200 ml-auto">
                <XIcon size={20} />
              </button>
            </div>

            <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
              {categories.map((cat) => {
                const IconComponent = cat.icon;
                return (
                  <button
                    key={cat.id}
                    onClick={() => handleCategoryClick(cat.id)}
                    className={`w-full flex items-center transition-all duration-200 rounded-lg whitespace-nowrap overflow-hidden ${isCollapsed ? "justify-center p-3" : "p-3"} ${activeCategory === cat.id ? "bg-[#ffb800] text-[#003366] font-semibold shadow-md" : "text-blue-100 hover:bg-blue-800"}`}
                    title={isCollapsed ? cat.label : ""}
                  >
                    <IconComponent size={20} className={`flex-shrink-0 ${isCollapsed ? "" : "mr-3"}`} />
                    <span className={`text-sm transition-all duration-300 ${isCollapsed ? "opacity-0 w-0" : "opacity-100"}`}>
                      {cat.label}
                    </span>
                  </button>
                );
              })}
            </nav>

            <div className={`p-6 bg-blue-950 text-[10px] text-blue-300 mt-auto border-t border-blue-900 transition-all duration-300 flex flex-col flex-shrink-0 ${isCollapsed ? "items-center text-center" : "items-start text-left"}`}>
              {isCollapsed ? (
                <ChartLine size={20} className="text-blue-300" title="Cursos Sebrae" />
              ) : (
                <Fragment>
                  <p className="font-bold mb-3 uppercase tracking-wider text-blue-200">Divisão de Análise de Dados e Indicadores|Casa Civil</p>
                  <ChartLine size={16} className="mb-2" />
                </Fragment>
              )}
            </div>
          </aside>
        </Fragment>
      );
    }

    const MapView = ({ locations }) => {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const [isLeafletLoaded, setIsLeafletLoaded] = useState(false);

      useEffect(() => {
        if (!document.querySelector('link[href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"]')) {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
          document.head.appendChild(link);
        }

        if (!window.L) {
          const script = document.createElement('script');
          script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
          script.onload = () => setIsLeafletLoaded(true);
          document.head.appendChild(script);
        } else {
          setIsLeafletLoaded(true);
        }
      }, []);

      useEffect(() => {
        if (!isLeafletLoaded || !mapRef.current) return;
        
        const L = window.L;

        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([-20.7383, -48.9108], 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(mapInstance.current);
        }

        mapInstance.current.eachLayer((layer) => {
          if (layer instanceof L.Marker) {
            mapInstance.current.removeLayer(layer);
          }
        });

        const customIcon = new L.Icon({
          iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
          shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          popupAnchor: [1, -34],
        });

        const bounds = [];
        locations.forEach(loc => {
          const popupHtml = `
            <div style="font-family: inherit; color: #334155; min-width: 200px;">
              ${loc.empresa && loc.empresa !== 'Não informada' ? `<div style="font-size: 14px; font-weight: bold; color: #003366; margin-bottom: 4px;">${loc.empresa}</div>` : ''}
              ${loc.nome && loc.nome !== 'Não informado' ? `<div style="font-size: 12px; margin-bottom: 2px;"><strong>Nome:</strong> ${loc.nome}</div>` : ''}
              ${loc.endereco && loc.endereco !== 'Não informado' ? `<div style="font-size: 12px;"><strong>Endereço:</strong> ${loc.endereco}</div>` : ''}
            </div>
          `;
          L.marker([loc.lat, loc.lng], { icon: customIcon })
           .addTo(mapInstance.current)
           .bindPopup(popupHtml);
          bounds.push([loc.lat, loc.lng]);
        });

        if (bounds.length > 0) {
          mapInstance.current.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
        }
      }, [locations, isLeafletLoaded]);

      return (
        <div ref={mapRef} className="w-full h-full rounded-xl z-0" style={{ zIndex: 0 }} />
      );
    };

    function AnalyticsDashboard({ data }) {
      const [selectedSegment, setSelectedSegment] = useState(null);

      // Componente customizado para quebrar os títulos muito compridos em várias linhas
      const CustomXAxisTick = ({ x, y, payload }) => {
        const words = payload.value.split(' ');
        let lines = [];
        let currentLine = '';
        
        words.forEach(word => {
          if (currentLine.length + word.length > 18 && currentLine !== '') {
            lines.push(currentLine.trim());
            currentLine = word + ' ';
          } else {
            currentLine += word + ' ';
          }
        });
        if (currentLine) lines.push(currentLine.trim());

        return (
          <g transform={`translate(${x},${y})`}>
            <text x={0} y={0} dy={16} textAnchor="end" fill="#64748b" fontSize={11} transform="rotate(-45)">
              {lines.map((line, index) => (
                <tspan x={0} dy={index === 0 ? 0 : 14} key={index}>
                  {line}
                </tspan>
              ))}
            </text>
          </g>
        );
      };

      const stats = useMemo(() => {
        if (!data || data.length === 0) return null;

        const getCol = (keywords) => {
          return Object.keys(data[0]).find(key => 
            keywords.some(kw => key.toLowerCase().includes(kw))
          );
        };

        const alunosCol = getCol(['aluno', 'quantidade', 'vaga']);
        const segmentoCol = getCol(['segmento', 'setor', 'ramo']);
        const porteCol = getCol(['porte', 'tamanho']);
        const generoCol = getCol(['gênero', 'genero', 'sexo']);
        const meiCol = getCol(['mei']);
        const meCol = getCol(['me']); 
        const eppCol = getCol(['epp']);
        const coordenadasCol = getCol(['coordenada', 'gps', 'latitude', 'latlong']);

        let totalAlunos = 0;
        const alunosPorCurso = {};
        const segmentoData = {};
        const mapLocations = [];
        let countMei = 0, countMe = 0, countEpp = 0;
        let countMasc = 0, countFem = 0;

        const segmentNamesMap = {}; // Mapa inteligente para unificar nomes de segmentos

        data.forEach(item => {
          const curso = item.curso || 'Sem Curso Atribuído';
          const alunos = alunosCol ? (Number(item[alunosCol]) || 0) : 1;
          
          totalAlunos += alunos;
          alunosPorCurso[curso] = (alunosPorCurso[curso] || 0) + alunos;

          if (coordenadasCol && item[coordenadasCol]) {
            const coordStr = String(item[coordenadasCol]).trim();
            const nums = coordStr.match(/-?\d+(?:[\.,]\d+)?/g);
            if (nums && nums.length >= 2) {
              const lat = parseFloat(nums[0].replace(',', '.'));
              const lng = parseFloat(nums[1].replace(',', '.'));
              if (!isNaN(lat) && !isNaN(lng)) {
                const keys = Object.keys(item);
                const empresaKey = keys.find(k => {
                  const lower = k.toLowerCase();
                  return lower.includes('razao') || lower.includes('razão') || lower.includes('fantasia') || (lower.includes('empresa') && !lower.includes('porte'));
                });
                const nomeKey = keys.find(k => {
                  const lower = k.toLowerCase();
                  return lower.includes('nome') && !lower.includes('empresa') && !lower.includes('razao') && !lower.includes('razão');
                });
                const enderecoKey = keys.find(k => k.toLowerCase().includes('endereço') || k.toLowerCase().includes('endereco') || k.toLowerCase().includes('rua') || k.toLowerCase().includes('logradouro'));
                
                mapLocations.push({
                  lat,
                  lng,
                  nome: (nomeKey && item[nomeKey]) ? censorName(String(item[nomeKey])) : 'Não informado',
                  empresa: (empresaKey && item[empresaKey]) ? String(item[empresaKey]) : 'Não informada',
                  endereco: (enderecoKey && item[enderecoKey]) ? String(item[enderecoKey]) : 'Não informado'
                });
              }
            }
          }

          if (segmentoCol) {
            const rawSeg = String(item[segmentoCol] || 'Não Informado').trim();
            if (rawSeg) {
              // Normaliza: remove acentos e deixa tudo minúsculo
              let cleanedSeg = rawSeg.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
              
              // Unifica plurais/singulares comuns para evitar duplicados
              if (cleanedSeg === 'servicos') cleanedSeg = 'servico';
              if (cleanedSeg === 'comercios') cleanedSeg = 'comercio';
              if (cleanedSeg === 'industrias') cleanedSeg = 'industria';

              // Define o nome de exibição oficial e formata a primeira letra para maiúscula
              let displayName = segmentNamesMap[cleanedSeg];
              if (!displayName) {
                if (cleanedSeg === 'comercio') displayName = 'Comércio';
                else if (cleanedSeg === 'servico') displayName = 'Serviços';
                else if (cleanedSeg === 'industria') displayName = 'Indústria';
                else if (cleanedSeg === 'agronegocio') displayName = 'Agronegócio';
                else displayName = rawSeg.charAt(0).toUpperCase() + rawSeg.slice(1);
                
                segmentNamesMap[cleanedSeg] = displayName;
              }

              if (!segmentoData[displayName]) segmentoData[displayName] = [];
              segmentoData[displayName].push(item);
            }
          }

          if (generoCol) {
            const genText = String(item[generoCol]).toUpperCase().trim();
            if (genText === 'M' || genText === 'MASCULINO') countMasc++;
            else if (genText === 'F' || genText === 'FEMININO') countFem++;
          }

          if (porteCol) {
            const p = String(item[porteCol]).toUpperCase();
            if (p.includes('MEI')) countMei++;
            else if (p.includes('EPP')) countEpp++;
            else if (p.includes('ME')) countMe++;
          } else {
            if (meiCol) countMei += Number(item[meiCol]) || 0;
            if (eppCol) countEpp += Number(item[eppCol]) || 0;
            const allVals = Object.values(item).join(' ').toUpperCase();
            if (!meiCol && allVals.includes('MEI')) countMei++;
            if (!eppCol && allVals.includes('EPP')) countEpp++;
            if (!meCol && (allVals.includes(' ME ') || allVals.includes('-ME'))) countMe++;
          }
        });

        const cursosUnicos = Object.keys(alunosPorCurso);
        const chartAlunos = cursosUnicos.map(c => ({ name: c, alunos: alunosPorCurso[c] }));

        const chartSegmento = Object.keys(segmentoData)
          .map(s => ({ name: s, value: segmentoData[s].length, items: segmentoData[s] }))
          .sort((a, b) => b.value - a.value);

        const chartPorte = [
          { name: 'MEI', value: countMei },
          { name: 'ME', value: countMe },
          { name: 'EPP', value: countEpp }
        ].filter(d => d.value > 0);

        const chartGenero = [
          { name: 'Masculino', value: countMasc },
          { name: 'Feminino', value: countFem }
        ].filter(d => d.value > 0);

        return {
          totalCursos: cursosUnicos.length,
          totalAlunos,
          chartAlunos,
          chartSegmento,
          chartPorte,
          chartGenero,
          mapLocations
        };
      }, [data]);

      if (!stats) return <div className="text-center p-8 text-slate-500">Sem dados para analisar.</div>;

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-12">
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center space-x-4">
              <div className="p-3 bg-blue-100 text-[#003366] rounded-xl"><BookOpen size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">Total de Cursos</p>
                <h3 className="text-2xl font-bold text-[#003366]">{stats.totalCursos}</h3>
              </div>
            </div>
            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center space-x-4">
              <div className="p-3 bg-green-100 text-green-700 rounded-xl"><UsersIcon size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">Total de Cadastros / Empresas</p>
                <h3 className="text-2xl font-bold text-[#003366]">{stats.totalAlunos}</h3>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm lg:col-span-2">
              <h4 className="text-lg font-bold text-[#003366] mb-6">Quantidade de Cadastros por Curso</h4>
              <div className="h-[450px] w-full">
                {stats.chartAlunos.length > 0 ? (
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={stats.chartAlunos} margin={{ top: 25, right: 10, left: -20, bottom: 120 }}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                      <XAxis 
                        dataKey="name" 
                        tick={<CustomXAxisTick />}
                        tickLine={false} 
                        axisLine={false}
                        interval={0}
                      />
                      <YAxis tick={{fontSize: 12, fill: '#64748b'}} tickLine={false} axisLine={false} />
                      <RechartsTooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                      <Bar dataKey="alunos" name="Cadastros" fill="#003366" radius={[4, 4, 0, 0]}>
                         <LabelList dataKey="alunos" position="top" fill="#003366" fontSize={12} fontWeight="bold" />
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                ) : (
                  <div className="h-full flex items-center justify-center text-sm text-slate-400">Dados insuficientes</div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm lg:col-span-2">
              <h4 className="text-lg font-bold text-[#003366] mb-6">Estatísticas por Segmento</h4>
              <div className="w-full">
                {stats.chartSegmento.length > 0 ? (
                  <div className="h-72 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={stats.chartSegmento.slice(0, 7)} layout="vertical" margin={{ top: 10, right: 30, left: 20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#e2e8f0" />
                        <XAxis type="number" tick={{fontSize: 12, fill: '#64748b'}} tickLine={false} axisLine={false} />
                        <YAxis type="category" dataKey="name" width={100} tick={{fontSize: 11, fill: '#334155'}} tickLine={false} axisLine={false} />
                        <RechartsTooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                        <Bar dataKey="value" name="Quantidade" fill="#14b8a6" radius={[0, 4, 4, 0]}>
                          {stats.chartSegmento.slice(0, 7).map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={CHART_COLORS[(index + 2) % CHART_COLORS.length]} />
                          ))}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                ) : (
                  <div className="h-72 flex flex-col items-center justify-center text-sm text-slate-400 text-center px-4">
                    <AlertCircle className="mb-2 text-slate-300" size={24} />
                    Sem dados de Segmento na planilha.
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
              <h4 className="text-lg font-bold text-[#003366] mb-6">Distribuição de Porte (MEI, ME, EPP)</h4>
              <div className="h-72 w-full">
                {stats.chartPorte.length > 0 ? (
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={stats.chartPorte} cx="50%" cy="50%" innerRadius={60} outerRadius={90} paddingAngle={5} dataKey="value">
                        {stats.chartPorte.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={CHART_COLORS[index % CHART_COLORS.length]} />
                        ))}
                      </Pie>
                      <RechartsTooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                      <Legend verticalAlign="bottom" height={36} iconType="circle" />
                    </PieChart>
                  </ResponsiveContainer>
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-sm text-slate-400 text-center px-4">
                    <AlertCircle className="mb-2 text-slate-300" size={24} />
                    Sem dados de Porte na planilha.
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
              <h4 className="text-lg font-bold text-[#003366] mb-6">Distribuição por Gênero</h4>
              <div className="h-72 w-full">
                {stats.chartGenero.length > 0 ? (
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={stats.chartGenero} cx="50%" cy="50%" innerRadius={60} outerRadius={90} paddingAngle={5} dataKey="value">
                        {stats.chartGenero.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={entry.name === 'Feminino' ? '#8b5cf6' : '#3b82f6'} />
                        ))}
                      </Pie>
                      <RechartsTooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                      <Legend verticalAlign="bottom" height={36} iconType="circle" />
                    </PieChart>
                  </ResponsiveContainer>
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-sm text-slate-400 text-center px-4">
                    <AlertCircle className="mb-2 text-slate-300" size={24} />
                    Sem dados de Gênero na planilha.
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm lg:col-span-2">
              <h4 className="text-lg font-bold text-[#003366] mb-6 flex items-center">
                <MapPin size={24} className="mr-2 text-teal-600" />
                Geolocalização dos Cadastros
              </h4>
              <div className="h-[400px] w-full relative z-0">
                {stats.mapLocations && stats.mapLocations.length > 0 ? (
                  <MapView locations={stats.mapLocations} />
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-sm text-slate-400 text-center px-4 border-2 border-dashed border-slate-100 rounded-xl">
                    <AlertCircle className="mb-2 text-slate-300" size={24} />
                    Sem dados de Coordenadas válidos encontrados na planilha.
                  </div>
                )}
              </div>
            </div>

          </div>

          {/* Cards de Detalhamento Movidos para o Final */}
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm mt-6">
            <h4 className="text-lg font-bold text-[#003366] mb-6 flex items-center">
              <MousePointerClick size={24} className="mr-2 text-teal-600" />
              Detalhamento por Segmento (Clique nos cards para ver as empresas listadas)
            </h4>
            {stats.chartSegmento.length > 0 ? (
              <div className="flex flex-wrap gap-3">
                {stats.chartSegmento.map((seg, idx) => (
                  <button
                    key={idx}
                    onClick={() => setSelectedSegment(seg)}
                    className="flex items-center justify-between px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl hover:bg-teal-50 hover:border-teal-300 hover:shadow-md transition-all duration-200 text-left group flex-grow sm:flex-grow-0 sm:w-[calc(50%-0.75rem)] lg:w-[calc(25%-0.75rem)]"
                  >
                    <span className="font-semibold text-slate-700 group-hover:text-teal-800 transition-colors line-clamp-1 mr-3" title={seg.name}>
                      {seg.name}
                    </span>
                    <span className="bg-white border border-slate-200 text-slate-600 group-hover:border-teal-200 group-hover:bg-teal-100 group-hover:text-teal-800 text-xs font-black px-2.5 py-1 rounded-full transition-colors">
                      {seg.value}
                    </span>
                  </button>
                ))}
              </div>
            ) : (
              <div className="text-sm text-slate-400">Sem dados de Segmento na planilha.</div>
            )}
          </div>

          {selectedSegment && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-slate-50 rounded-2xl shadow-2xl w-full max-w-6xl max-h-[90vh] flex flex-col overflow-hidden transform transition-all scale-in-95">
                <div className="flex justify-between items-center p-5 sm:p-6 border-b border-slate-200 bg-white">
                  <div>
                    <h3 className="text-xl sm:text-2xl font-black text-[#003366] flex items-center gap-2">
                      <PieChartIcon size={24} className="text-teal-600" />
                      Segmento: {selectedSegment.name}
                    </h3>
                    <p className="text-sm text-slate-500 mt-1 font-medium">
                      {selectedSegment.value} {selectedSegment.value === 1 ? 'empresa cadastrada' : 'empresas cadastradas'}
                    </p>
                  </div>
                  <button 
                    onClick={() => setSelectedSegment(null)} 
                    className="p-2 sm:p-3 hover:bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors flex-shrink-0"
                  >
                    <XIcon size={24}/>
                  </button>
                </div>
                <div className="overflow-y-auto p-0 flex-1 bg-white">
                  <DataGridTable items={selectedSegment.items} />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DataGridTable({ items }) {
      if (!items || items.length === 0) return null;

      const specialKeys = ['id', 'icon', 'url', 'status', 'tags', 'curso', 'acao', 'ação'];
      const allKeys = Array.from(new Set(items.flatMap(item => Object.keys(item))));
      const dynamicColumns = allKeys.filter(key => !specialKeys.includes(key.toLowerCase()));

      return (
        <div className="w-full overflow-x-auto">
          <table className="w-full text-left border-collapse">
            <thead className="bg-slate-50 sticky top-0 shadow-sm z-10">
              <tr className="text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                {dynamicColumns.map(col => (
                  <th key={col} className="p-4 font-bold whitespace-nowrap">{col}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100 text-sm">
              {items.map((item, idx) => (
                <tr key={item.id || idx} className="hover:bg-slate-50 transition-colors">
                  {dynamicColumns.map(col => {
                    const keyLower = col.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const isFrequencia = keyLower.includes("frequencia") || keyLower.includes("percentual");
                    const formatted = formatDataValue(col, item[col]);
                    
                    return (
                      <td key={col} className={`p-4 max-w-xs truncate ${isFrequencia ? 'bg-blue-50/50' : ''}`} title={String(item[col] || "")}>
                        {isFrequencia ? (
                          <span className="inline-flex items-center px-2.5 py-1 rounded-md bg-blue-100 text-blue-800 font-bold text-xs">
                            {formatted}
                          </span>
                        ) : (
                          <span className="text-slate-600">{formatted}</span>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function DataGridCards({ items }) {
      if (!items || items.length === 0) return null;

      const specialKeys = ['id', 'icon', 'url', 'status', 'tags', 'curso', 'acao', 'ação'];
      const allKeys = Array.from(new Set(items.flatMap(item => Object.keys(item))));
      const dynamicColumns = allKeys.filter(key => !specialKeys.includes(key.toLowerCase()));

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in duration-500">
          {items.map((item) => {
            const keys = Object.keys(item);
            const empresaKey = keys.find(k => {
              const lower = k.toLowerCase();
              return lower.includes('razao') || lower.includes('razão') || lower.includes('fantasia') || (lower.includes('empresa') && !lower.includes('porte'));
            });
            const nomeCompletoKey = keys.find(k => {
              const lower = k.toLowerCase();
              return lower.includes('nome') && !lower.includes('empresa') && !lower.includes('razao') && !lower.includes('razão');
            });

            const primaryTitle = (empresaKey && item[empresaKey]) 
              ? item[empresaKey] 
              : (item.title || 'Cadastro');

            const rawSecondary = (nomeCompletoKey && item[nomeCompletoKey]) ? item[nomeCompletoKey] : null;
            const secondaryTitle = rawSecondary ? censorName(String(rawSecondary)) : null;

            return (
              <div key={item.id || Math.random()} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 hover:shadow-md hover:border-blue-300 transition-all flex flex-col group">
                <div className="mb-4 pb-4 border-b border-slate-100">
                  <h4 className="text-lg font-bold text-[#003366] leading-tight mb-1 group-hover:text-blue-600 transition-colors">
                    {primaryTitle}
                  </h4>
                  {secondaryTitle && (
                    <p className="text-sm font-medium text-slate-500 flex items-center">
                      <UserIcon size={14} className="mr-1.5 opacity-70" />
                      {secondaryTitle}
                    </p>
                  )}
                </div>
                
                <div className="space-y-3 flex-1">
                  {dynamicColumns.map(col => {
                    if (col === empresaKey || col === nomeCompletoKey) return null;

                    const keyLower = col.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    const isFrequencia = keyLower.includes("frequencia") || keyLower.includes("percentual");
                    const formatted = formatDataValue(col, item[col]);

                    return (
                      <div key={col} className={`flex flex-col ${isFrequencia ? 'bg-blue-50/60 p-3 rounded-xl border border-blue-100/50 mt-2' : ''}`}>
                        <span className={`text-[10px] font-bold uppercase tracking-wider mb-0.5 ${isFrequencia ? 'text-blue-600' : 'text-slate-400'}`}>
                          {col}
                        </span>
                        <span className={`text-sm break-words ${isFrequencia ? 'text-blue-700 font-black text-lg' : 'text-slate-700'}`} title={String(item[col] || "")}>
                          {formatted}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [activeCategory, setActiveCategory] = useState("geral");

      const [customLinks, setCustomLinks] = useState([]);
      const [customCategories, setCustomCategories] = useState([
        { id: "geral", label: "Painel Geral", icon: PieChartIcon }
      ]);
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState(null);

      const fetchScriptData = async () => {
        setIsLoading(true);
        setError(null);
        try {
          const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw90C_oDqwNshphO5mI9JcNlmYvX1bK8U1fDS42l9JfVCtjvGaQCMzyVrRp0taRlgS4MQ/exec?aba=geral";
          const response = await fetch(WEB_APP_URL);
          const rawText = await response.text();
          
          let result;
          try {
            result = JSON.parse(rawText);
          } catch(e) {
            throw new Error("A resposta não é um JSON válido. Verifique a permissão do Google Apps Script.");
          }
          
          if (result.status === "success") {
            const linksData = result.data || [];
            setCustomLinks(linksData);

            const uniqueCursos = Array.from(new Set(linksData.map(l => l.curso))).filter(Boolean);
            const dynamicCategories = uniqueCursos.map(cursoNome => ({
              id: String(cursoNome),
              label: String(cursoNome).charAt(0).toUpperCase() + String(cursoNome).slice(1), 
              icon: FolderIcon 
            }));

            setCustomCategories([
              { id: "geral", label: "Painel Geral", icon: PieChartIcon },
              ...dynamicCategories
            ]);

          } else {
            setError("Erro na folha: " + (result.message || "Resposta inesperada do servidor."));
          }
        } catch (err) {
          console.error(err);
          setError("Erro ao carregar os dados. Verifique a ligação à folha de cálculo e se a permissão está definida para 'Qualquer Pessoa'.");
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchScriptData();
      }, []);

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-[#003366] overflow-hidden">
          <Sidebar 
            isCollapsed={isSidebarCollapsed} 
            setIsCollapsed={setIsSidebarCollapsed}
            isMobileOpen={isMobileMenuOpen}
            setIsMobileOpen={setIsMobileMenuOpen}
            categories={customCategories}
            activeCategory={activeCategory}
            setActiveCategory={setActiveCategory}
          />
          
          <div className="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto relative">
            <Header 
              toggleMobileMenu={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
              activeCategoryLabel={
                activeCategory === "geral" 
                  ? "Painel Geral de Estatísticas" 
                  : customCategories.find(c => c.id === activeCategory)?.label || activeCategory
              }
            />
            
            <main className="flex-1 p-6 lg:p-8">
              {isLoading ? (
                <div className="flex flex-col justify-center items-center h-full min-h-[300px]">
                  <RefreshCw className="animate-spin text-[#003366] mb-4" size={40} />
                  <p className="text-gray-500 font-medium">A analisar dados da folha...</p>
                </div>
              ) : error ? (
                <div className="text-center mt-20 text-red-600 font-medium bg-red-50 p-6 rounded-2xl border border-red-100 max-w-lg mx-auto">
                  <AlertCircle className="mx-auto mb-4 text-red-500" size={48} />
                  {error}
                </div>
              ) : (
                <div className="w-full pb-12">
                  {customLinks.length > 0 ? (
                    activeCategory === "geral" ? (
                      <AnalyticsDashboard data={customLinks} />
                    ) : (
                      <DataGridCards items={customLinks.filter(l => l.curso === activeCategory)} />
                    )
                  ) : (
                    <div className="flex flex-col items-center justify-center mt-20 p-12 bg-white rounded-3xl border border-slate-200 max-w-xl mx-auto shadow-sm">
                      <LayoutDashboard size={64} className="text-slate-200 mb-6" />
                      <h3 className="text-xl font-bold text-[#003366] mb-2 text-center">
                        Nenhum dado encontrado
                      </h3>
                      <p className="text-slate-500 mb-8 text-center max-w-sm">A folha de cálculo parece estar vazia ou a conexão falhou.</p>
                      <button
                        onClick={() => fetchScriptData()}
                        className="bg-[#003366] text-white px-8 py-3 rounded-xl text-sm font-bold shadow-md hover:bg-blue-800 transition-all hover:-translate-y-0.5"
                      >
                        Tentar Novamente
                      </button>
                    </div>
                  )}
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
